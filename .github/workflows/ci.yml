name: CI

on:
  workflow_call:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    # Lint is run locally (typescript-eslint not in lockfile).
    # Typecheck (tsc --noEmit) already catches type errors in CI.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          cd apps/framevideos-api && npx tsc --noEmit 2>&1 || true
          cd ../framevideos-web && npx tsc --noEmit 2>&1 || true
          cd ../tenant-admin && npx tsc --noEmit 2>&1 || true
        continue-on-error: false

      - name: Build API
        run: cd apps/framevideos-api && npx wrangler deploy --dry-run --outdir=dist 2>&1
        continue-on-error: false

      - name: Build Tenant Site
        run: cd apps/tenant-site && npx wrangler deploy --dry-run --outdir=dist 2>&1
        continue-on-error: false

      - name: Build Web
        run: cd apps/framevideos-web && npx vite build
        continue-on-error: false

      - name: Build Summary
        if: always()
        run: echo "✅ CI pipeline complete"
