name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/framevideos-web/**'
      - 'packages/shared/**'
      - 'packages/ui/**'

jobs:
  deploy-web:
    name: Deploy framevideos-web to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: apps/framevideos-web
        run: npx vite build
        env:
          VITE_API_URL: https://api.framevideos.com

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/framevideos-web/dist --project-name=framevideos-web --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
